<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pancake Stack — Pancake Design Kit</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="tokens.css">
  <style>
    @layer component {
      /* Pancake (duplicated from pancake.html so this file renders standalone) */
      .pancake {
        --pancake-color-back: var(--branded-stroke-01);
        --pancake-color-front: var(--strong-branded-surface);

        position: relative;
        display: inline-block;
        width: 200px;
        aspect-ratio: 1;
      }

      .pancake-shape {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .pancake[data-color="alt-1"] {
        --pancake-color-back: var(--branded-stroke-02);
        --pancake-color-front: var(--alt-strong-branded-surface-01);
      }

      .pancake[data-color="alt-2"] {
        --pancake-color-back: var(--branded-stroke-03);
        --pancake-color-front: var(--alt-strong-branded-surface-02);
      }

      /* Pancake stack */
      .pancake-stack {
        --pancake-stack-width: 200px;
        --pancake-stack-offset: 45px;

        position: relative;
        display: inline-block;
        width: var(--pancake-stack-width);
        height: calc(var(--pancake-stack-width) + 2 * var(--pancake-stack-offset));
      }

      .pancake-stack > .pancake {
        position: absolute;
        width: 100%;
        height: auto;
      }

      .pancake-stack > [data-stack-pos="top"] {
        top: 0;
        z-index: 3;
      }

      .pancake-stack > [data-stack-pos="middle"] {
        top: var(--pancake-stack-offset);
        transform: translateX(10%);
        z-index: 2;
      }

      .pancake-stack > [data-stack-pos="under"] {
        top: calc(2 * var(--pancake-stack-offset));
        z-index: 1;
      }
    }

    .pancake-sprite {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    /* Demo page styles (not part of the kit) */
    body {
      padding: var(--spacing-xxl);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-xxl);
      background: var(--surface);
      color: var(--text);
    }

    .demo-title {
      font-size: var(--font-size-header-03);
      margin-bottom: var(--spacing-lg);
    }

    .demo-row {
      display: flex;
      gap: var(--spacing-xxl);
      align-items: flex-start;
      flex-wrap: wrap;
    }
  </style>
</head>

        </div>
      </div>
    </div>
  </section>
