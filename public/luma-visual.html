<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Luma Visual — 1080×1080</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ============================================================
         CONFIG — edit these variables to adjust without touching
         anything else in the file
         ============================================================ */
      :root {
        /* Canvas */
        --size: 1080px;

        /* Colors */
        --bg:          #fffef8;
        --text:        #0a0a0a;
        --frame-outer: #0a0a0a;
        --body-bg:     #0a0a0a;

        /* pink accent — single source of truth, matches bottom-right blob */
        --accent:      var(--blob-pink);
        --frame-inner: var(--blob-pink);

        /* Border widths */
        --border-outer: 10px;
        --border-inner: 4px;
        --frame-gap:    26px;

        /* Typography */
        --font-display: "Space Grotesk", system-ui, sans-serif;
        --font-size-h1: 118px;
        --letter-spacing: -0.055em;

        /* Tagline pill */
        --pill-bg:     #0a0a0a;
        --pill-text:   #fffef8;
        --pill-size:   26px;

        /* Footer */
        --footer-size: 28px;

        /* Logo */
        --logo-size: 140px;

        /* Blob colors (pancake palette) */
        --blob-purple: #8b85f5;
        --blob-orange: #ffb039;
        --blob-pink:   #ff8fa3;
        --blob-yellow: #ffd23d;
        --blob-stroke: #0a0a0a;
        --blob-stroke-w: 6;
      }
      /* ============================================================ */

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        background: var(--body-bg);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      /* export mode: strip padding/bg so the card fills the viewport for screenshots */
      html.export, html.export body {
        padding: 0;
        background: transparent;
        min-height: 0;
      }

      .card {
        position: relative;
        width: var(--size);
        height: var(--size);
        background: var(--bg);
        border: var(--border-outer) solid var(--frame-outer);
        overflow: hidden;
        flex-shrink: 0;
      }

      /* organic colored blobs (background decoration) */
      .blob {
        position: absolute;
        z-index: 1;
        pointer-events: none;
      }
      .blob svg {
        width: 100%;
        height: 100%;
        display: block;
        overflow: visible;
      }
      .blob path {
        stroke: var(--blob-stroke);
        stroke-width: var(--blob-stroke-w);
        stroke-linejoin: round;
      }

      /* top-right: purple blob peeking in */
      .blob-purple {
        top: -180px;
        right: -140px;
        width: 520px;
        height: 520px;
      }
      .blob-purple path { fill: var(--blob-purple); }

      /* bottom-left: orange blob peeking in */
      .blob-orange {
        bottom: -140px;
        left: -160px;
        width: 460px;
        height: 460px;
      }
      .blob-orange path { fill: var(--blob-orange); }

      /* middle-right: pink blob */
      .blob-pink {
        top: 62%;
        right: -120px;
        width: 300px;
        height: 300px;
      }
      .blob-pink path { fill: var(--blob-pink); }

      /* middle-left small: yellow blob */
      .blob-yellow {
        top: 38%;
        left: -100px;
        width: 240px;
        height: 240px;
      }
      .blob-yellow path { fill: var(--blob-yellow); }

      /* pancake logo top-left */
      .logo {
        position: absolute;
        top: 44px;
        left: 74px;
        z-index: 9;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .logo-mark {
        width: var(--logo-size);
        height: var(--logo-size);
        object-fit: contain;
        display: block;
      }
      .logo-wordmark {
        height: 160px;
        width: auto;
        object-fit: contain;
        display: block;
      }
      .logo-url {
        font-family: var(--font-display);
        font-weight: 500;
        font-size: 24px;
        letter-spacing: -0.01em;
        color: var(--text);
      }

      /* asterisk star top-right */
      .star {
        position: absolute;
        top: 74px;
        right: 74px;
        z-index: 9;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 140px;
        line-height: 1;
        color: var(--accent);
      }

      /* content */
      .content {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 36px;
        padding: 0 110px;
        z-index: 5;
        text-align: center;
      }

      h1 {
        font-family: var(--font-display);
        font-size: var(--font-size-h1);
        font-weight: 700;
        line-height: 0.95;
        letter-spacing: var(--letter-spacing);
        color: var(--text);
      }

      h1 span {
        display: block;
      }

      /* "Meetup #2" label sitting on the purple blob, with orange highlighter */
      .edition {
        position: absolute;
        top: 130px;
        left: 888px;
        transform: translate(-50%, -50%);
        z-index: 9;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 46px;
        letter-spacing: -0.03em;
        line-height: 1;
        color: var(--text);
        white-space: nowrap;
        padding: 6px 18px;
        display: inline-block;
      }
      .edition::before {
        content: "";
        position: absolute;
        left: -2%;
        right: -2%;
        top: -8%;
        bottom: -8%;
        background: var(--blob-orange);
        z-index: -1;
        transform: skew(-3deg) rotate(-1deg);
        border-radius: 6px;
      }

      .accent { color: var(--accent); }

      .asterisk {
        position: relative;
        top: -0.32em;
        font-size: 0.4em;
        color: var(--accent);
        margin-left: 4px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 14px 28px;
        background: var(--pill-bg);
        border: 2px solid var(--frame-outer);
        font-family: var(--font-display);
        font-size: var(--pill-size);
        font-weight: 500;
        letter-spacing: -0.01em;
        color: var(--pill-text);
      }

      .pill-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
      }

      /* footer: date/time */
      .footer {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 80px;
        z-index: 9;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 22px;
        padding: 0 80px;
        font-family: var(--font-display);
        font-weight: 500;
        font-size: 38px;
        letter-spacing: -0.01em;
        color: var(--text);
      }

      .footer .dot {
        width: 8px;
        height: 8px;
        background: var(--accent);
        border-radius: 50%;
      }

      .footer .line {
        flex: 1;
        height: 2px;
        background: var(--text);
        max-width: 120px;
      }
    </style>
    <script>
      if (location.search.includes('export')) {
        document.documentElement.classList.add('export');
      }
    </script>
  </head>
  <body>
    <div class="card">
      <!-- decorative organic blobs -->
      <div class="blob blob-purple">
        <svg viewBox="0 0 200 200" preserveAspectRatio="none">
          <path d="M 55,25 C 95,8 155,15 180,55 C 200,95 195,145 160,175 C 120,200 65,195 30,165 C 0,135 5,80 25,50 C 35,35 45,28 55,25 Z" />
        </svg>
      </div>

      <div class="blob blob-orange">
        <svg viewBox="0 0 200 200" preserveAspectRatio="none">
          <path d="M 95,15 C 150,10 185,55 180,110 C 175,160 130,195 80,185 C 25,175 5,120 15,75 C 25,40 55,20 95,15 Z" />
        </svg>
      </div>

      <div class="blob blob-pink">
        <svg viewBox="0 0 200 200" preserveAspectRatio="none">
          <path d="M 105,15 C 150,20 185,55 180,105 C 175,155 130,185 85,175 C 35,165 10,120 20,75 C 30,35 70,12 105,15 Z" />
        </svg>
      </div>

      <div class="logo">
        <img class="logo-wordmark" src="pancake-wordmark.png" alt="pancake" />
        <span class="logo-url">getpancake.ai</span>
      </div>

      <div class="edition">Meetup #2</div>

      <section class="content">
        <h1>
          <span>Build an</span>
          <span class="accent">autonomous</span>
          <span>company with</span>
          <span>OpenClaw</span>
        </h1>

      </section>

      <div class="footer">
        <span>THU 04/30</span>
        <span class="dot"></span>
        <span>18:00 PT</span>
      </div>
    </div>
  </body>
</html>
